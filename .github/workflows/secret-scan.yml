name: Basic secret scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan common sensitive patterns
        shell: bash
        run: |
          set -e

          FOUND=0

          check_pattern() {
            PATTERN="$1"
            DESCRIPTION="$2"

            if grep -RInE \
              --exclude-dir=.git \
              --exclude='secret-scan.yml' \
              "$PATTERN" .; then
              echo "::error::$DESCRIPTION"
              FOUND=1
            fi
          }

          check_pattern 'sk_live_[A-Za-z0-9]+' \
            'Possible live Stripe secret key found.'

          check_pattern 'sk_test_[A-Za-z0-9]+' \
            'Possible test Stripe secret key found.'

          check_pattern 'https://script\.google\.com/macros/s/[A-Za-z0-9_-]+/exec' \
            'Possible deployed Apps Script URL found.'

          if [ "$FOUND" -ne 0 ]; then
            exit 1
          fi

          echo "No common secret patterns found."
